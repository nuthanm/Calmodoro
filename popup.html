<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calmodoro</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">

    <!-- Header -->
    <header class="header">
      <span class="logo">🍅 Calmodoro</span>
      <button class="icon-btn" id="settings-btn" title="Settings" aria-label="Open settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </header>

    <!-- Mode tabs -->
    <nav class="mode-tabs" role="tablist">
      <button class="tab active" data-mode="work"       role="tab" aria-selected="true">Focus</button>
      <button class="tab"        data-mode="shortBreak" role="tab" aria-selected="false">Short Break</button>
      <button class="tab"        data-mode="longBreak"  role="tab" aria-selected="false">Long Break</button>
    </nav>

    <!-- Circular timer -->
    <div class="timer-wrap">
      <svg class="ring" viewBox="0 0 220 220" aria-hidden="true">
        <circle class="ring-track"    cx="110" cy="110" r="96"/>
        <circle class="ring-progress" cx="110" cy="110" r="96" id="ring-progress"/>
      </svg>
      <div class="timer-inner">
        <div class="timer-time" id="timer-display">25:00</div>
        <div class="timer-label" id="timer-label">Focus</div>
      </div>
    </div>

    <!-- Session progress dots -->
    <div class="dots-row" id="session-dots" aria-label="Sessions completed"></div>

    <!-- Control buttons -->
    <div class="controls">
      <button class="btn btn-primary" id="start-btn">Start</button>
      <button class="btn btn-secondary" id="reset-btn" title="Reset timer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
          <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/>
        </svg>
      </button>
    </div>

    <!-- Do Not Disturb toggle -->
    <label class="dnd-row" for="dnd-toggle" title="Suppress break animations and notifications">
      <span class="dnd-label">Do Not Disturb</span>
      <span class="switch">
        <input type="checkbox" id="dnd-toggle" role="switch">
        <span class="switch-track"></span>
      </span>
    </label>

  </div>
  <script src="popup.js"></script>
</body>
</html>
