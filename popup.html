<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calmodoro</title>
  <link rel="stylesheet" href="design-tokens.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">

    <header class="header">
      <a class="logo-mark" href="#" id="logo-link" aria-label="Calmodoro">
        <svg viewBox="0 0 32 32" fill="none" aria-hidden="true">
          <circle cx="16" cy="16" r="15" fill="#E07A5F" opacity="0.15"/>
          <ellipse cx="16" cy="18" rx="9" ry="10" fill="#E07A5F"/>
          <path d="M10 14 Q16 6 22 14" fill="#7C9A82"/>
          <ellipse cx="16" cy="12" rx="3" ry="2" fill="#5F7D65" opacity="0.5"/>
          <ellipse cx="13" cy="17" rx="1.5" ry="2" fill="white" opacity="0.35"/>
        </svg>
        <span class="wordmark">Calmodoro</span>
      </a>
      <div class="header-actions">
        <button class="icon-btn" id="stats-btn" title="Stats" aria-label="View stats">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
        </button>
        <button class="icon-btn" id="settings-btn" title="Settings" aria-label="Open settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>
    </header>

    <div class="schedule-banner hidden" id="schedule-banner" role="status" aria-live="polite">
      <span class="schedule-banner__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"></circle>
          <path d="M12 16v-4"></path>
          <path d="M12 8h.01"></path>
        </svg>
      </span>
      <span class="schedule-banner__text">
        <span class="schedule-banner__msg" id="schedule-banner-msg">Timer paused by schedule.</span>
        <span class="schedule-banner__meta" id="schedule-banner-meta"></span>
      </span>
    </div>

    <nav class="mode-tabs" role="tablist">
      <button class="tab active" data-mode="work" role="tab">Focus</button>
      <button class="tab" data-mode="shortBreak" role="tab">Short Break</button>
      <button class="tab" data-mode="longBreak" role="tab">Long Break</button>
    </nav>

    <div class="timer-wrap">
      <svg class="ring" viewBox="0 0 220 220" aria-hidden="true">
        <circle class="ring-track" cx="110" cy="110" r="96"/>
        <circle class="ring-progress" cx="110" cy="110" r="96" id="ring-progress"/>
      </svg>
      <div class="timer-inner">
        <div class="timer-time" id="timer-display">25:00</div>
        <div class="timer-label" id="timer-label">Focus</div>
      </div>
    </div>

    <div class="dots-row" id="session-dots" aria-label="Sessions completed"></div>

    <div class="controls">
      <button class="btn btn-primary btn-start" id="start-btn">Start</button>
      <button class="btn btn-reset" id="reset-btn" title="Reset timer" aria-label="Reset">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/></svg>
      </button>
    </div>

    <div class="stats-row" id="stats-row">
      <div class="stat"><div class="stat-val" id="stat-focus">0</div><div class="stat-label">Focus</div></div>
      <div class="stat"><div class="stat-val" id="stat-breaks">0</div><div class="stat-label">Breaks</div></div>
      <div class="stat"><div class="stat-val stat-warn" id="stat-skipped">0</div><div class="stat-label">Skipped</div></div>
      <div class="stat"><div class="stat-val" id="stat-eyes">0</div><div class="stat-label">Eye tips</div></div>
    </div>

    <label class="dnd-row" for="dnd-toggle">
      <span class="dnd-label">Do Not Disturb</span>
      <span class="switch">
        <input type="checkbox" id="dnd-toggle" role="switch">
        <span class="switch-track"></span>
      </span>
    </label>

  </div>
  <script src="timerUtils.js"></script>
  <script src="settingsDefaults.js"></script>
  <script src="scheduleUtils.js"></script>
  <script src="popup.js"></script>
</body>
</html>
