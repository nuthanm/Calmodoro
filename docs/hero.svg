<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">Calmodoro  calm Pomodoro wellness extension</title>
  <desc id="heroDesc">Original hero banner with tomato logo, timer ring, and wellness panels</desc>

  <!-- Background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAF8F5"/>
      <stop offset="100%" stop-color="#F3F0EB"/>
    </linearGradient>
    <linearGradient id="blobSage" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C9A82" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#7C9A82" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="blobCoral" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E07A5F" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#E07A5F" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="420" fill="url(#bgGrad)"/>
  <ellipse cx="180" cy="80" rx="220" ry="160" fill="url(#blobSage)"/>
  <ellipse cx="1020" cy="340" rx="240" ry="170" fill="url(#blobCoral)"/>

  <!-- Left: logo + title -->
  <g transform="translate(80 110)">
    <circle cx="48" cy="48" r="44" fill="#E07A5F" opacity="0.14"/>
    <ellipse cx="48" cy="54" rx="28" ry="30" fill="#E07A5F"/>
    <path d="M24 42 Q48 18 72 42" fill="#7C9A82"/>
    <ellipse cx="48" cy="36" rx="8" ry="5" fill="#5F7D65" opacity="0.45"/>

    <text x="110" y="44" font-family="Segoe UI, system-ui, sans-serif" font-size="42" font-weight="700" fill="#2D2A26">Calmodoro</text>
    <text x="110" y="82" font-family="Segoe UI, system-ui, sans-serif" font-size="20" fill="#6B6560">Calm Pomodoro · Wellness breaks · Live icon timer</text>
    <text x="110" y="118" font-family="Segoe UI, system-ui, sans-serif" font-size="15" fill="#9A948D">Focus with purpose. Recharge with hydrate, blink, and stretch rituals.</text>
  </g>

  <!-- Center: timer ring mock -->
  <g transform="translate(520 70)">
    <circle cx="110" cy="110" r="96" fill="none" stroke="#F3F0EB" stroke-width="14"/>
    <circle cx="110" cy="110" r="96" fill="none" stroke="#E07A5F" stroke-width="14" stroke-linecap="round"
            stroke-dasharray="603" stroke-dashoffset="150" transform="rotate(-90 110 110)"/>
    <text x="110" y="102" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="44" font-weight="700" fill="#2D2A26">18:42</text>
    <text x="110" y="132" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="13" font-weight="600" fill="#E07A5F" letter-spacing="2">FOCUS</text>
    <!-- badge on icon mock -->
    <g transform="translate(168 24)">
      <rect x="0" y="0" width="72" height="34" rx="17" fill="#E07A5F"/>
      <text x="36" y="23" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">18:42</text>
    </g>
    <text x="110" y="250" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="12" fill="#9A948D">Toolbar icon badge updates every second</text>
  </g>

  <!-- Right: triptych mini panels -->
  <g transform="translate(820 95)">
    <rect x="0" y="0" width="110" height="150" rx="16" fill="#FFFFFF" stroke="#E8E4DF"/>
    <rect x="0" y="0" width="110" height="150" rx="16" fill="none" stroke="#6BA3BE" stroke-width="3" clip-path="inset(0 0 147 0 round 16 16 0 0)"/>
    <text x="55" y="28" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600" fill="#6B6560">HYDRATE</text>
    <circle cx="55" cy="78" r="22" fill="#FFD5A8"/>
    <rect x="72" y="68" width="14" height="20" rx="3" fill="#6BA3BE"/>

    <rect x="125" y="0" width="110" height="150" rx="16" fill="#FFFFFF" stroke="#E8E4DF"/>
    <rect x="125" y="0" width="110" height="150" rx="16" fill="none" stroke="#7C9A82" stroke-width="3" clip-path="inset(0 0 147 0 round 16 16 0 0)"/>
    <text x="180" y="28" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600" fill="#6B6560">BLINK</text>
    <circle cx="180" cy="78" r="26" fill="#FFD5A8"/>
    <path d="M168 76 Q180 68 192 76" stroke="#3D2B1F" stroke-width="2" fill="none"/>

    <rect x="250" y="0" width="110" height="150" rx="16" fill="#FFFFFF" stroke="#E8E4DF"/>
    <rect x="250" y="0" width="110" height="150" rx="16" fill="none" stroke="#D4A574" stroke-width="3" clip-path="inset(0 0 147 0 round 16 16 0 0)"/>
    <text x="305" y="28" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600" fill="#6B6560">STRETCH</text>
    <circle cx="305" cy="58" r="10" fill="#FFD5A8"/>
    <line x1="305" y1="68" x2="305" y2="105" stroke="#7C9A82" stroke-width="4" stroke-linecap="round"/>
    <line x1="305" y1="82" x2="280" y2="62" stroke="#7C9A82" stroke-width="4" stroke-linecap="round"/>
    <line x1="305" y1="82" x2="330" y2="62" stroke="#7C9A82" stroke-width="4" stroke-linecap="round"/>
  </g>

  <text x="80" y="390" font-family="Segoe UI, system-ui, sans-serif" font-size="12" fill="#9A948D">Original Calmodoro artwork · MIT licensed project · No third-party images in this banner</text>
</svg>
