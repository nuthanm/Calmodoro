<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 380" role="img" aria-labelledby="flowTitle">
  <title id="flowTitle">Calmodoro user flow diagram</title>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6B6560"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="1000" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FAF8F5"/>
      <stop offset="100%" stop-color="#F3F0EB"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="380" fill="url(#bg)" rx="16"/>

  <!-- Row 1: main flow -->
  <g font-family="Segoe UI, system-ui, sans-serif">
    <rect x="30" y="130" width="150" height="72" rx="14" fill="#FFFFFF" stroke="#E07A5F" stroke-width="2"/>
    <text x="105" y="162" text-anchor="middle" font-size="14" font-weight="700" fill="#2D2A26">Start Focus</text>
    <text x="105" y="182" text-anchor="middle" font-size="11" fill="#6B6560">Popup ’ Start</text>

    <line x1="180" y1="166" x2="218" y2="166" stroke="#6B6560" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="220" y="118" width="190" height="96" rx="14" fill="#FFFFFF" stroke="#E07A5F" stroke-width="2"/>
    <text x="315" y="150" text-anchor="middle" font-size="14" font-weight="700" fill="#2D2A26">Background Timer</text>
    <text x="315" y="170" text-anchor="middle" font-size="11" fill="#6B6560">Service worker + alarms</text>
    <text x="315" y="190" text-anchor="middle" font-size="11" fill="#E07A5F" font-weight="600">Icon badge counts down</text>

    <line x1="410" y1="166" x2="448" y2="166" stroke="#6B6560" stroke-width="2" marker-end="url(#arrow)"/>

    <polygon points="450,166 490,136 530,166 490,196" fill="#FFFFFF" stroke="#D4A574" stroke-width="2"/>
    <text x="490" y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#2D2A26">Session</text>
    <text x="490" y="178" text-anchor="middle" font-size="12" font-weight="700" fill="#2D2A26">ends?</text>

    <line x1="530" y1="150" x2="568" y2="110" stroke="#6B6560" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="530" y1="182" x2="568" y2="222" stroke="#6B6560" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Break path -->
    <rect x="570" y="68" width="180" height="84" rx="14" fill="#FFFFFF" stroke="#7C9A82" stroke-width="2"/>
    <text x="660" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#2D2A26">Break Triptych</text>
    <text x="660" y="120" text-anchor="middle" font-size="11" fill="#6B6560">Hydrate · Blink · Stretch</text>

    <line x1="750" y1="110" x2="788" y2="110" stroke="#6B6560" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="790" y="80" width="170" height="72" rx="14" fill="#FFFFFF" stroke="#7C9A82" stroke-width="2"/>
    <text x="875" y="112" text-anchor="middle" font-size="14" font-weight="700" fill="#2D2A26">Accept / Skip</text>
    <text x="875" y="132" text-anchor="middle" font-size="11" fill="#6B6560">Logged in stats</text>

    <!-- Micro-reminder path -->
    <rect x="570" y="200" width="180" height="84" rx="14" fill="#FFFFFF" stroke="#6BA3BE" stroke-width="2"/>
    <text x="660" y="232" text-anchor="middle" font-size="14" font-weight="700" fill="#2D2A26">Micro-Reminder</text>
    <text x="660" y="252" text-anchor="middle" font-size="11" fill="#6B6560">Toast or notification</text>

    <line x1="750" y1="242" x2="788" y2="242" stroke="#6B6560" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="790" y="212" width="170" height="72" rx="14" fill="#FFFFFF" stroke="#6BA3BE" stroke-width="2"/>
    <text x="875" y="244" text-anchor="middle" font-size="14" font-weight="700" fill="#2D2A26">Accept / Skip</text>
    <text x="875" y="264" text-anchor="middle" font-size="11" fill="#6B6560">Eye · Water · Stretch</text>

    <!-- Legend -->
    <text x="30" y="40" font-size="18" font-weight="700" fill="#2D2A26">How Calmodoro works</text>
    <text x="30" y="62" font-size="12" fill="#6B6560">Timer runs in the extension background  popup can be closed</text>

    <rect x="30" y="280" width="14" height="14" rx="3" fill="#E07A5F"/>
    <text x="52" y="292" font-size="11" fill="#6B6560">Focus / timer</text>
    <rect x="150" y="280" width="14" height="14" rx="3" fill="#7C9A82"/>
    <text x="172" y="292" font-size="11" fill="#6B6560">Pomodoro break</text>
    <rect x="280" y="280" width="14" height="14" rx="3" fill="#6BA3BE"/>
    <text x="302" y="292" font-size="11" fill="#6B6560">Micro-reminder</text>
    <rect x="430" y="280" width="14" height="14" rx="3" fill="#D4A574"/>
    <text x="452" y="292" font-size="11" fill="#6B6560">Decision point</text>
  </g>
</svg>
