<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Popup Preview – Calmodoro Prototype</title>
  <link rel="stylesheet" href="design-tokens.css">
  <style>
    body { min-height: 100vh; }

    .demo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 24px 64px;
      gap: 24px;
    }

    .demo-label {
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
    }

    /* Popup chrome */
    .popup-frame {
      width: 360px;
      background: var(--bg);
      border-radius: 20px;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .popup-inner {
      padding: 20px 22px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .popup-header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .icon-btn {
      width: 34px; height: 34px;
      border: none; background: var(--surface);
      border-radius: 10px;
      cursor: pointer;
      color: var(--text-muted);
      display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--border);
      transition: background 0.15s;
    }
    .icon-btn:hover { background: var(--surface-hover); color: var(--text); }

    /* Mode tabs */
    .mode-tabs {
      display: flex;
      width: 100%;
      background: var(--bg-subtle);
      border-radius: var(--radius-pill);
      padding: 4px;
      gap: 4px;
    }

    .tab {
      flex: 1;
      padding: 8px 6px;
      border: none;
      background: transparent;
      border-radius: var(--radius-pill);
      font-family: var(--font);
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: background 0.2s, color 0.2s, box-shadow 0.2s;
    }

    .tab.active {
      background: var(--surface);
      color: var(--mode-color);
      box-shadow: var(--shadow-sm);
    }

    /* Timer ring */
    .timer-wrap { position: relative; width: 200px; height: 200px; }

    .timer-ring {
      transform: rotate(-90deg);
    }

    .timer-ring .track { fill: none; stroke: var(--bg-subtle); stroke-width: 8; }
    .timer-ring .progress {
      fill: none;
      stroke: var(--mode-color);
      stroke-width: 8;
      stroke-linecap: round;
      stroke-dasharray: 565;
      stroke-dashoffset: 141;
      transition: stroke 0.3s;
    }

    .timer-display {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .timer-time {
      font-size: 42px;
      font-weight: 700;
      letter-spacing: -0.03em;
      font-variant-numeric: tabular-nums;
      color: var(--text);
    }

    .timer-mode {
      font-size: 12px;
      font-weight: 600;
      color: var(--mode-color);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* Session dots */
    .session-dots {
      display: flex;
      gap: 8px;
    }

    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--bg-subtle);
      border: 2px solid var(--border-strong);
    }

    .dot.done { background: var(--mode-color); border-color: var(--mode-color); }

    /* Controls */
    .controls {
      display: flex;
      gap: 10px;
      width: 100%;
    }

    .btn-start { flex: 1; padding: 14px; font-size: 15px; }

    .btn-reset {
      width: 48px; height: 48px;
      border-radius: 50%;
      border: 1px solid var(--border-strong);
      background: var(--surface);
      cursor: pointer;
      color: var(--text-muted);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .btn-reset:hover { background: var(--surface-hover); color: var(--text); }

    /* Stats row */
    .stats-row {
      width: 100%;
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    .stat {
      flex: 1;
      text-align: center;
    }

    .stat-val {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    .stat-val.warn { color: var(--amber); }

    .stat-label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    /* DND toggle */
    .dnd-row {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    .dnd-label { font-size: 13px; font-weight: 500; color: var(--text-secondary); }

    .switch {
      position: relative;
      width: 44px; height: 24px;
      cursor: pointer;
    }

    .switch input { opacity: 0; width: 0; height: 0; }

    .switch-track {
      position: absolute;
      inset: 0;
      background: var(--bg-subtle);
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      transition: background 0.2s;
    }

    .switch-track::after {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      left: 2px; top: 2px;
      background: var(--surface);
      border-radius: 50%;
      box-shadow: var(--shadow-sm);
      transition: transform 0.2s;
    }

    .switch input:checked + .switch-track { background: var(--sage-soft); border-color: var(--sage); }
    .switch input:checked + .switch-track::after { transform: translateX(20px); background: var(--sage); }

    /* Mode switch demo */
    .mode-demo {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .mode-demo button {
      padding: 6px 14px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      background: var(--surface);
      font-family: var(--font);
      font-size: 12px;
      cursor: pointer;
      color: var(--text-secondary);
    }

    .mode-demo button:hover { border-color: var(--border-strong); }
  </style>
</head>
<body>
  <div id="proto-nav-mount"></div>

  <div class="demo-wrap">
    <p class="demo-label">Extension popup — 360 × ~520px · click mode buttons below to preview colors</p>

    <div class="popup-frame">
      <div class="popup-inner">
        <header class="popup-header">
          <a href="index.html" class="logo-mark">
            <svg viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="15" fill="#E07A5F" opacity="0.15"/><ellipse cx="16" cy="18" rx="9" ry="10" fill="#E07A5F"/><path d="M10 14 Q16 6 22 14" fill="#7C9A82"/><ellipse cx="16" cy="12" rx="3" ry="2" fill="#5F7D65" opacity="0.5"/><ellipse cx="13" cy="17" rx="1.5" ry="2" fill="white" opacity="0.35"/></svg>
            <span class="wordmark">Calmodoro</span>
          </a>
          <button class="icon-btn" title="Settings" aria-label="Settings">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          </button>
        </header>

        <div class="mode-tabs">
          <button class="tab active" data-mode="focus">Focus</button>
          <button class="tab" data-mode="short">Short Break</button>
          <button class="tab" data-mode="long">Long Break</button>
        </div>

        <div class="timer-wrap">
          <svg class="timer-ring" width="200" height="200" viewBox="0 0 200 200">
            <circle class="track" cx="100" cy="100" r="90"/>
            <circle class="progress" id="ring-progress" cx="100" cy="100" r="90"/>
          </svg>
          <div class="timer-display">
            <span class="timer-time" id="timer-time">18:42</span>
            <span class="timer-mode" id="timer-mode">Focus</span>
          </div>
        </div>

        <div class="session-dots" id="session-dots">
          <span class="dot done"></span>
          <span class="dot done"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>

        <div class="controls">
          <button class="btn btn-primary btn-start" id="start-btn">Start Focus</button>
          <button class="btn-reset" aria-label="Reset">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
          </button>
        </div>

        <div class="stats-row">
          <div class="stat">
            <div class="stat-val">3</div>
            <div class="stat-label">Focus</div>
          </div>
          <div class="stat">
            <div class="stat-val">2</div>
            <div class="stat-label">Breaks</div>
          </div>
          <div class="stat">
            <div class="stat-val warn">1</div>
            <div class="stat-label">Skipped</div>
          </div>
          <div class="stat">
            <div class="stat-val">4</div>
            <div class="stat-label">Eye tips</div>
          </div>
        </div>

        <div class="dnd-row">
          <span class="dnd-label">Do Not Disturb</span>
          <label class="switch">
            <input type="checkbox">
            <span class="switch-track"></span>
          </label>
        </div>
      </div>
    </div>

    <div class="mode-demo">
      <button onclick="setMode('focus')">Focus mode</button>
      <button onclick="setMode('short')">Short break</button>
      <button onclick="setMode('long')">Long break</button>
    </div>
  </div>

  <script src="shared.js"></script>
  <script>
    const MODES = {
      focus: { color: '#E07A5F', soft: 'rgba(224,122,95,0.12)', label: 'Focus', time: '18:42', btn: 'Start Focus', progress: 141 },
      short: { color: '#7C9A82', soft: 'rgba(124,154,130,0.14)', label: 'Short Break', time: '04:32', btn: 'Start Break', progress: 280 },
      long:  { color: '#6BA3BE', soft: 'rgba(107,163,190,0.14)', label: 'Long Break', time: '12:00', btn: 'Start Break', progress: 80 }
    };

    function setMode(mode) {
      const m = MODES[mode];
      document.documentElement.style.setProperty('--mode-color', m.color);
      document.documentElement.style.setProperty('--mode-soft', m.soft);
      document.getElementById('timer-time').textContent = m.time;
      document.getElementById('timer-mode').textContent = m.label;
      document.getElementById('start-btn').textContent = m.btn;
      document.getElementById('ring-progress').style.strokeDashoffset = m.progress;
      document.querySelectorAll('.tab').forEach(t => {
        t.classList.toggle('active', t.dataset.mode === mode);
      });
    }

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => setMode(tab.dataset.mode));
    });

    let running = false;
    document.getElementById('start-btn').addEventListener('click', function() {
      running = !running;
      this.textContent = running ? 'Pause' : MODES.focus.btn;
    });
  </script>
</body>
</html>
