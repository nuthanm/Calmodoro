<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stats – Calmodoro</title>
  <link rel="stylesheet" href="design-tokens.css">
  <link rel="stylesheet" href="stats.css">
</head>
<body>
  <div class="stats-page">
    <header class="page-header">
      <a class="logo-mark" href="#">
        <svg viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="15" fill="#E07A5F" opacity="0.15"/><ellipse cx="16" cy="18" rx="9" ry="10" fill="#E07A5F"/><path d="M10 14 Q16 6 22 14" fill="#7C9A82"/></svg>
        <span class="wordmark">Your Progress</span>
      </a>
      <p class="subtitle">Today's focus, breaks, skips, and reminders</p>
    </header>

    <div class="summary-grid" id="summary"></div>

    <section class="card">
      <h2 class="section-title">Micro-Reminders Today</h2>
      <div class="bar-chart" id="bar-chart"></div>
    </section>

    <section class="card">
      <h2 class="section-title">Recent Activity</h2>
      <div class="log-list" id="log-list"></div>
    </section>
  </div>
  <script src="stats.js"></script>
</body>
</html>
