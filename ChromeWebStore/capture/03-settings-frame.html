<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>03 — Settings</title>
  <link rel="stylesheet" href="../../design-tokens.css">
  <link rel="stylesheet" href="../../settings.css">
  <link rel="stylesheet" href="store-capture.css">
  <style>
    .settings-capture .page-header { grid-column: 1 / -1; margin-bottom: 4px; }
    .day-pill.active { background: var(--sage-soft); border-color: var(--sage); color: var(--sage-dark); }
    .switch input:checked + .switch-track { background: var(--sage-soft); border-color: var(--sage); }
    .switch input:checked + .switch-track::after { transform: translateX(20px); background: var(--sage); }
  </style>
</head>
<body>
  <div class="fullpage-view">
    <div class="settings-capture">
      <header class="page-header">
        <a class="logo-mark">
          <svg viewBox="0 0 32 32" fill="none" width="28" height="28">
            <circle cx="16" cy="16" r="15" fill="#E07A5F" opacity="0.15"/>
            <ellipse cx="16" cy="18" rx="9" ry="10" fill="#E07A5F"/>
            <path d="M10 14 Q16 6 22 14" fill="#7C9A82"/>
          </svg>
          <span class="wordmark">Settings</span>
        </a>
        <p class="subtitle">Active hours, reminders, and break presentation</p>
      </header>

      <section class="card">
        <h2 class="section-title">Active Hours</h2>
        <div class="field field-stack">
          <label>Work days</label>
          <div class="day-pills">
            <button type="button" class="day-pill">Su</button>
            <button type="button" class="day-pill active">Mo</button>
            <button type="button" class="day-pill active">Tu</button>
            <button type="button" class="day-pill active">We</button>
            <button type="button" class="day-pill active">Th</button>
            <button type="button" class="day-pill active">Fr</button>
            <button type="button" class="day-pill">Sa</button>
          </div>
        </div>
        <div class="field">
          <label>Start of day</label>
          <input type="time" class="time-input" value="09:00" readonly>
        </div>
        <div class="field">
          <label>End of day</label>
          <input type="time" class="time-input" value="18:00" readonly>
        </div>
        <div class="field">
          <div><span class="field-name">Lunch block</span><span class="field-desc">Pause all timers</span></div>
          <div class="time-range">
            <input type="time" class="time-input" value="12:30" readonly>
            <span>–</span>
            <input type="time" class="time-input" value="13:30" readonly>
          </div>
        </div>
      </section>

      <section class="card">
        <h2 class="section-title">Micro-Reminders</h2>
        <div class="toggle-field">
          <div class="toggle-info"><span class="toggle-name">Eye rest (20-20-20)</span></div>
          <label class="switch"><input type="checkbox" checked><span class="switch-track"></span></label>
        </div>
        <div class="field">
          <label>Interval (min)</label>
          <div class="stepper">
            <button type="button" class="step-btn">−</button>
            <input type="number" value="20" readonly>
            <button type="button" class="step-btn">+</button>
          </div>
        </div>
        <div class="toggle-field">
          <div class="toggle-info"><span class="toggle-name">Hydration</span></div>
          <label class="switch"><input type="checkbox" checked><span class="switch-track"></span></label>
        </div>
        <div class="field">
          <label>Interval (min)</label>
          <div class="stepper">
            <button type="button" class="step-btn">−</button>
            <input type="number" value="45" readonly>
            <button type="button" class="step-btn">+</button>
          </div>
        </div>
        <div class="toggle-field">
          <div class="toggle-info"><span class="toggle-name">Stretch / posture</span></div>
          <label class="switch"><input type="checkbox" checked><span class="switch-track"></span></label>
        </div>
        <div class="field">
          <label>Interval (min)</label>
          <div class="stepper">
            <button type="button" class="step-btn">−</button>
            <input type="number" value="60" readonly>
            <button type="button" class="step-btn">+</button>
          </div>
        </div>
      </section>
    </div>
  </div>
</body>
</html>
