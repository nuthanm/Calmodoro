<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>02 — Break Triptych</title>
  <link rel="stylesheet" href="../../design-tokens.css">
  <link rel="stylesheet" href="../../animations.css">
  <link rel="stylesheet" href="../../break.css">
  <link rel="stylesheet" href="store-capture.css">
  <style>
    html, body { background: var(--bg); }
    .break-shell {
      max-width: 1200px;
      padding: 36px 48px 32px;
      min-height: 800px;
      justify-content: center;
    }
    .break-title-block h1 { font-size: 28px; }
    .triptych { gap: 20px; }
    .wellness-panel { padding: 20px 16px; }
    .anim-stage svg { width: 120px; height: 150px; }
    .panel-tip { font-size: 13px; }
  </style>
</head>
<body>
  <div class="bg-blobs"><div class="bg-blob bg-blob-1"></div><div class="bg-blob bg-blob-2"></div></div>
  <main class="break-shell">
    <div class="break-top">
      <div class="break-title-block">
        <a class="logo-mark">
          <svg viewBox="0 0 32 32" fill="none" width="28" height="28">
            <circle cx="16" cy="16" r="15" fill="#E07A5F" opacity="0.15"/>
            <ellipse cx="16" cy="18" rx="9" ry="10" fill="#E07A5F"/>
            <path d="M10 14 Q16 6 22 14" fill="#7C9A82"/>
          </svg>
          <span class="wordmark">Calmodoro</span>
        </a>
        <h1>Time to recharge</h1>
        <p>Hydrate · Rest your eyes · Move your body</p>
      </div>
      <div class="break-meta">
        <span class="badge badge-sage">Short Break</span>
        <div class="countdown-pill">
          <span class="time">04:32</span>
          <span class="label">remaining</span>
        </div>
      </div>
    </div>
    <div class="triptych">
      <div class="wellness-panel panel-accent-hydrate">
        <span class="panel-label">Hydrate</span>
        <div class="anim-stage" id="anim-hydrate"></div>
        <p class="panel-tip">Drink a full glass of water. Stay sharp and hydrated.</p>
      </div>
      <div class="wellness-panel panel-accent-blink">
        <span class="panel-label">Rest Eyes</span>
        <div class="anim-stage" id="anim-blink"></div>
        <p class="panel-tip">20-20-20: look 20 feet away for 20 seconds.</p>
      </div>
      <div class="wellness-panel panel-accent-move">
        <span class="panel-label">Move</span>
        <div class="anim-stage" id="anim-move"></div>
        <p class="panel-tip">Reach up, roll shoulders — undo desk posture.</p>
      </div>
    </div>
    <div class="break-footer">
      <button class="btn btn-primary">Accept Break</button>
      <button class="btn btn-secondary">Skip →</button>
    </div>
  </main>
  <script src="../../characters.js"></script>
  <script>
    document.getElementById('anim-hydrate').innerHTML = svgHydrate();
    document.getElementById('anim-blink').innerHTML = svgBlink();
    document.getElementById('anim-move').innerHTML = svgStretch();
  </script>
</body>
</html>
