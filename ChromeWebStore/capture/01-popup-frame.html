<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>01 — Popup Timer</title>
  <link rel="stylesheet" href="../../design-tokens.css">
  <link rel="stylesheet" href="../../popup.css">
  <link rel="stylesheet" href="store-capture.css">
  <style>
    .popup-anchor .container { width: 360px; }
    .popup-anchor .header-actions .icon-btn { pointer-events: none; }
    .ring-progress { stroke-dashoffset: 451; }
    .dot.done { background: var(--coral); border-color: var(--coral); }
  </style>
</head>
<body>
  <div class="browser-frame">
    <div class="browser-titlebar">
      <span class="win-btn close"></span>
      <span class="win-btn min"></span>
      <span class="win-btn max"></span>
      <span class="title">Project notes — Google Chrome</span>
    </div>
    <div class="tab-strip">
      <div class="tab-item active">
        <span class="favicon doc"></span>
        Q2 Planning — Notes
      </div>
    </div>
    <div class="toolbar-row">
      <div class="nav-btns">
        <span class="nav-btn">←</span>
        <span class="nav-btn">→</span>
        <span class="nav-btn">↻</span>
      </div>
      <div class="address-bar">
        <span class="lock">🔒</span>
        docs.google.com/document/d/…
      </div>
      <div class="ext-toolbar">
        <div class="ext-icon-slot pinned">
          <svg width="20" height="20" viewBox="0 0 32 32" fill="none">
            <circle cx="16" cy="16" r="15" fill="#E07A5F" opacity="0.15"/>
            <ellipse cx="16" cy="18" rx="9" ry="10" fill="#E07A5F"/>
            <path d="M10 14 Q16 6 22 14" fill="#7C9A82"/>
          </svg>
          <span class="ext-badge">18:42</span>
        </div>
      </div>
    </div>
    <div class="browser-content">
      <div class="page-work">
        <div class="doc-title">Q2 Planning — Sprint Goals</div>
        <div class="doc-line w90"></div>
        <div class="doc-line w80"></div>
        <div class="doc-line w65"></div>
        <div class="doc-line w90"></div>
        <div class="doc-line w45"></div>
        <div class="doc-line w80"></div>
        <div class="doc-line w65"></div>
      </div>
      <div class="popup-anchor">
        <div class="popup-shadow">
          <div class="container">
            <header class="header">
              <a class="logo-mark">
                <svg viewBox="0 0 32 32" fill="none" width="28" height="28">
                  <circle cx="16" cy="16" r="15" fill="#E07A5F" opacity="0.15"/>
                  <ellipse cx="16" cy="18" rx="9" ry="10" fill="#E07A5F"/>
                  <path d="M10 14 Q16 6 22 14" fill="#7C9A82"/>
                </svg>
                <span class="wordmark">Calmodoro</span>
              </a>
              <div class="header-actions">
                <button class="icon-btn" title="Stats">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
                </button>
                <button class="icon-btn" title="Settings">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                </button>
              </div>
            </header>
            <nav class="mode-tabs">
              <button class="tab active">Focus</button>
              <button class="tab">Short Break</button>
              <button class="tab">Long Break</button>
            </nav>
            <div class="timer-wrap">
              <svg class="ring" viewBox="0 0 220 220">
                <circle class="ring-track" cx="110" cy="110" r="96"/>
                <circle class="ring-progress" cx="110" cy="110" r="96"/>
              </svg>
              <div class="timer-inner">
                <div class="timer-time">18:42</div>
                <div class="timer-label">Focus</div>
              </div>
            </div>
            <div class="dots-row">
              <span class="dot done"></span>
              <span class="dot done"></span>
              <span class="dot"></span>
              <span class="dot"></span>
            </div>
            <div class="controls">
              <button class="btn btn-primary btn-start">Pause</button>
              <button class="btn btn-reset">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/></svg>
              </button>
            </div>
            <div class="stats-row">
              <div class="stat"><div class="stat-val">3</div><div class="stat-label">Focus</div></div>
              <div class="stat"><div class="stat-val">2</div><div class="stat-label">Breaks</div></div>
              <div class="stat"><div class="stat-val stat-warn">1</div><div class="stat-label">Skipped</div></div>
              <div class="stat"><div class="stat-val">4</div><div class="stat-label">Eye tips</div></div>
            </div>
            <label class="dnd-row">
              <span class="dnd-label">Do Not Disturb</span>
              <span class="switch"><input type="checkbox"><span class="switch-track"></span></span>
            </label>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
