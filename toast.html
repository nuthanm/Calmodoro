<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calmodoro</title>
  <link rel="stylesheet" href="design-tokens.css">
  <link rel="stylesheet" href="toast.css">
</head>
<body>
  <div class="toast-card">
    <div class="toast-row">
      <div class="toast-icon" id="toast-icon">👁</div>
      <div class="toast-text">
        <h2 id="toast-title">Rest your eyes</h2>
        <p id="toast-message">Look 20 feet away · 20 seconds</p>
      </div>
    </div>
    <div class="toast-actions">
      <button class="btn btn-primary" id="accept-btn">Accept</button>
      <button class="btn btn-ghost" id="skip-btn">Skip</button>
    </div>
  </div>
  <script src="toast.js"></script>
</body>
</html>
