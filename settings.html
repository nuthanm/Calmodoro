<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calmodoro – Settings</title>
  <link rel="stylesheet" href="design-tokens.css">
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <div class="page">
    <header class="page-header">
      <a class="logo-mark" href="#">
        <svg viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="15" fill="#E07A5F" opacity="0.15"/><ellipse cx="16" cy="18" rx="9" ry="10" fill="#E07A5F"/><path d="M10 14 Q16 6 22 14" fill="#7C9A82"/></svg>
        <span class="wordmark">Settings</span>
      </a>
      <p class="subtitle">Active hours, reminders, and break presentation</p>
    </header>

    <section class="card">
      <h2 class="section-title">Active Hours</h2>
      <div class="field field-stack">
        <label>Work days</label>
        <div class="day-pills" id="day-pills">
          <button type="button" class="day-pill" data-day="0">Su</button>
          <button type="button" class="day-pill" data-day="1">Mo</button>
          <button type="button" class="day-pill" data-day="2">Tu</button>
          <button type="button" class="day-pill" data-day="3">We</button>
          <button type="button" class="day-pill" data-day="4">Th</button>
          <button type="button" class="day-pill" data-day="5">Fr</button>
          <button type="button" class="day-pill" data-day="6">Sa</button>
        </div>
      </div>
      <div class="field">
        <label for="schedule-start">Start of day</label>
        <input type="time" id="schedule-start" class="time-input">
      </div>
      <div class="field">
        <label for="schedule-end">End of day</label>
        <input type="time" id="schedule-end" class="time-input">
      </div>
      <div class="field">
        <div><span class="field-name">Lunch block</span><span class="field-desc">Pause all timers</span></div>
        <div class="time-range">
          <input type="time" id="lunch-start" class="time-input">
          <span>–</span>
          <input type="time" id="lunch-end" class="time-input">
        </div>
      </div>
    </section>

    <section class="card">
      <h2 class="section-title">Timer Durations</h2>
      <div class="field">
        <label for="work-duration">Focus (default, min)</label>
        <div class="stepper">
          <button type="button" class="step-btn" data-op="dec" data-target="work-duration">−</button>
          <input type="number" id="work-duration" min="1" max="90" value="25">
          <button type="button" class="step-btn" data-op="inc" data-target="work-duration">+</button>
        </div>
      </div>
      <div class="field">
        <label for="morning-focus">Morning focus (09:00–12:30)</label>
        <div class="stepper">
          <button type="button" class="step-btn" data-op="dec" data-target="morning-focus">−</button>
          <input type="number" id="morning-focus" min="1" max="90" value="50">
          <button type="button" class="step-btn" data-op="inc" data-target="morning-focus">+</button>
        </div>
      </div>
      <div class="field">
        <label for="afternoon-focus">Afternoon focus (13:30–18:00)</label>
        <div class="stepper">
          <button type="button" class="step-btn" data-op="dec" data-target="afternoon-focus">−</button>
          <input type="number" id="afternoon-focus" min="1" max="90" value="25">
          <button type="button" class="step-btn" data-op="inc" data-target="afternoon-focus">+</button>
        </div>
      </div>
      <div class="field">
        <label for="short-break">Short break (min)</label>
        <div class="stepper">
          <button type="button" class="step-btn" data-op="dec" data-target="short-break">−</button>
          <input type="number" id="short-break" min="1" max="30" value="5">
          <button type="button" class="step-btn" data-op="inc" data-target="short-break">+</button>
        </div>
      </div>
      <div class="field">
        <label for="long-break">Long break (min)</label>
        <div class="stepper">
          <button type="button" class="step-btn" data-op="dec" data-target="long-break">−</button>
          <input type="number" id="long-break" min="5" max="60" value="15">
          <button type="button" class="step-btn" data-op="inc" data-target="long-break">+</button>
        </div>
      </div>
      <div class="field">
        <label for="sessions-count">Sessions before long break</label>
        <div class="stepper">
          <button type="button" class="step-btn" data-op="dec" data-target="sessions-count">−</button>
          <input type="number" id="sessions-count" min="1" max="10" value="4">
          <button type="button" class="step-btn" data-op="inc" data-target="sessions-count">+</button>
        </div>
      </div>
    </section>

    <section class="card">
      <h2 class="section-title">Micro-Reminders</h2>
      <div class="toggle-field">
        <div class="toggle-info"><span class="toggle-name">Eye rest (20-20-20)</span></div>
        <label class="switch"><input type="checkbox" id="reminder-blink"><span class="switch-track"></span></label>
      </div>
      <div class="field">
        <label for="interval-blink">Interval (min)</label>
        <div class="stepper">
          <button type="button" class="step-btn" data-op="dec" data-target="interval-blink">−</button>
          <input type="number" id="interval-blink" min="5" max="120" value="20">
          <button type="button" class="step-btn" data-op="inc" data-target="interval-blink">+</button>
        </div>
      </div>
      <div class="toggle-field">
        <div class="toggle-info"><span class="toggle-name">Hydration</span></div>
        <label class="switch"><input type="checkbox" id="reminder-water"><span class="switch-track"></span></label>
      </div>
      <div class="field">
        <label for="interval-water">Interval (min)</label>
        <div class="stepper">
          <button type="button" class="step-btn" data-op="dec" data-target="interval-water">−</button>
          <input type="number" id="interval-water" min="5" max="180" value="45">
          <button type="button" class="step-btn" data-op="inc" data-target="interval-water">+</button>
        </div>
      </div>
      <div class="toggle-field">
        <div class="toggle-info"><span class="toggle-name">Stretch / posture</span></div>
        <label class="switch"><input type="checkbox" id="reminder-stretch"><span class="switch-track"></span></label>
      </div>
      <div class="field">
        <label for="interval-stretch">Interval (min)</label>
        <div class="stepper">
          <button type="button" class="step-btn" data-op="dec" data-target="interval-stretch">−</button>
          <input type="number" id="interval-stretch" min="5" max="180" value="60">
          <button type="button" class="step-btn" data-op="inc" data-target="interval-stretch">+</button>
        </div>
      </div>
    </section>

    <section class="card">
      <h2 class="section-title">Presentation & Behavior</h2>
      <div class="toggle-field">
        <div class="toggle-info"><span class="toggle-name">Do Not Disturb</span></div>
        <label class="switch"><input type="checkbox" id="dnd-pref"><span class="switch-track"></span></label>
      </div>
      <div class="field">
        <label for="break-window-mode">Full break layout</label>
        <select id="break-window-mode" class="select-input">
          <option value="fullWindow">Full window</option>
          <option value="sideRight">Half — Right</option>
          <option value="sideLeft">Half — Left</option>
          <option value="sideTop">Half — Top</option>
          <option value="sideBottom">Half — Bottom</option>
          <option value="popup">Popup (520×640)</option>
        </select>
      </div>
      <div class="field">
        <label for="reminder-window-mode">Micro-reminder layout</label>
        <select id="reminder-window-mode" class="select-input">
          <option value="toast">Compact toast</option>
          <option value="notification">System notification</option>
          <option value="sideRight">Half panel — Right</option>
        </select>
      </div>
      <div class="toggle-field">
        <div class="toggle-info"><span class="toggle-name">Auto-start breaks</span></div>
        <label class="switch"><input type="checkbox" id="auto-break"><span class="switch-track"></span></label>
      </div>
      <div class="toggle-field">
        <div class="toggle-info"><span class="toggle-name">Auto-start focus</span></div>
        <label class="switch"><input type="checkbox" id="auto-work"><span class="switch-track"></span></label>
      </div>
      <div class="toggle-field">
        <div class="toggle-info"><span class="toggle-name">Sound on reminders</span></div>
        <label class="switch"><input type="checkbox" id="sound-enabled"><span class="switch-track"></span></label>
      </div>
      <div class="field field-stack">
        <label>After sleep / system off</label>
        <div class="radio-group">
          <label class="radio-option"><input type="radio" name="offline" value="ask" checked> Ask me (recommended)</label>
          <label class="radio-option"><input type="radio" name="offline" value="resume"> Resume timer</label>
          <label class="radio-option"><input type="radio" name="offline" value="reset"> Reset to idle</label>
        </div>
      </div>
    </section>

    <div class="action-row">
      <button class="btn btn-primary btn-save" id="save-btn">Save Settings</button>
      <button class="btn btn-secondary btn-reset" id="defaults-btn">Restore Defaults</button>
    </div>
    <div class="toast hidden" id="toast">✓ Settings saved</div>
  </div>
  <script src="settingsDefaults.js"></script>
  <script src="settings.js"></script>
</body>
</html>
